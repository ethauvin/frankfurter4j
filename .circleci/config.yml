version: 2.1

commands:
  build_and_test:
    steps:
      - checkout
      - restore_cache:
          name: Restore bld dependencies
          keys:
            - bld-deps-{{ arch }}-{{ checksum "lib/bld/bld-wrapper.properties" }}
            - bld-deps-{{ arch }}-
      - run:
          name: Download dependencies
          command: |
            if [ ! -f "lib/bld/bld.cache" ]; then
              echo "No cache found - downloading dependencies"
              ./bld download purge
            else
              echo "Cache found -> skipping download"
            fi
      - run:
          name: Update dependencies
          command: |
            if [ -f "lib/bld/bld.cache" ]; then
              echo "Cache found - running updates"
              ./bld updates
            else
              echo "No cache -> skipping updates"
            fi
      - save_cache:
          name: Save bld dependencies
          key: bld-deps-{{ arch }}-{{ checksum "lib/bld/bld-wrapper.properties" }}
          paths:
            - lib
      - run:
          name: Compile source
          command: ./bld compile
      - run:
          name: Run tests
          command: ./bld jacoco
      - run:
          name: Run reporter
          when: on_fail
          command: ./bld reporter --all
      - store_test_results:
          path: build/test-results/test/
      - store_artifacts:
          path: build/reports/jacoco/test/html
jobs:
  bld_jdk17:
    docker:
      - image: cimg/openjdk:17.0
    steps:
      - build_and_test

  bld_jdk21:
    docker:
      - image: cimg/openjdk:21.0
    steps:
      - build_and_test

workflows:
  bld:
    jobs:
      - bld_jdk17
      - bld_jdk21